<body>

<div class="header">
  <div class="hico">📦</div>
  <div>
    <div class="htitle">Picking Lima Sur</div>
    <div class="hsub">Consulta de órdenes</div>
  </div>
  <div class="hright">
    <div class="htime" id="hTime">—</div>
    <div class="hstatus load" id="hStatus">Cargando...</div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn on" id="tabConsulta" onclick="switchTab('consulta')">📋 Consulta</button>
  <button class="tab-btn" id="tabHistPick" onclick="switchTab('historico')">👥 Histórico</button>
  <button class="tab-btn" id="tabDash" onclick="switchTab('dashboard')">📊 Productividad</button>
</div>

<div id="app">
  <div class="loading-screen" id="loadScreen">
    <div class="spinner"></div>
    <div>
      <div class="load-txt">Cargando datos del día...</div>
      <div class="load-sub">Conectando con el servidor</div>
    </div>
  </div>
</div>

<div id="dashApp" style="display:none"></div>
<div id="dashHistorico" style="display:none"></div>
<div id="histPickApp" style="display:none"></div>

<button class="fab" id="fab">🤖</button>

<div class="modal-bg" id="modalBg">
  <div class="modal-sheet">
    <div class="mh">
      <div class="mavatar">🤖</div>
      <div class="mh-info">
        <h3>Asistente de Picking</h3>
        <p>Pregunta lo que necesites sobre el día</p>
      </div>
      <button class="m-close" id="mClose">✕</button>
    </div>
    <div class="msgs" id="msgs">
      <div class="msg msg-ai">¡Hola! 👋 Puedo consultarte info sobre placas, controladores, cantidades y productos del día. ¿Qué necesitas?</div>
    </div>
    <div class="quick-qs">
      <button class="qq" onclick="quickQ('¿Cuántas placas hay en total hoy?')">📋 Total placas</button>
      <button class="qq" onclick="quickQ('¿Qué controladores están trabajando?')">👷 Controladores</button>
      <button class="qq" onclick="quickQ('¿Cuáles son las 5 placas con más cajas?')">🏆 Top 5 placas</button>
      <button class="qq" onclick="quickQ('¿Cuántas cajas y unidades hay en total?')">📦 Totales del día</button>
    </div>
    <div class="m-input-row">
      <input type="text" id="mInput" placeholder="Escribe tu pregunta..." maxlength="300">
      <button class="m-send" id="mSend" onclick="sendAI()">➤</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const GITHUB_USER = "Lavoro2026";
const GITHUB_REPO = "picking-limasur";
const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/picking_data.json`;
const HISTORICO_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/historico_data.json`;
const HISTORICO_PICADORES_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/historico_picadores.json`;
const WORKER_URL = "https://picking-api.almacenero2ls-lavoro.workers.dev";
const PERSONAL_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/personal.json`;
const REFRESH_MS = 3 * 60 * 1000;
const PIN_SUPERVISOR = "Lavoro";
const PASS_PRODUCTIVIDAD = "Lavoro2026$";
// ─────────────────────────────────────────────────────────────────

let allData = [];
let personalList = [];
let asignaciones = [];
let ctx = "";
let refreshTimer;
let tabActual = "consulta";
let historicoData = null;
let historicoPicadoresData = null;
let fechaSeleccionadaHist = null;
let fechaProductividad = null;
let familiaProductividad = "todas";
let zonaProductividad = "todas";
let registrosFiltradosProductividad = [];
let productividadDesbloqueada = false;
let chartTotalInstance = null;
let chartFamiliaInstance = null;
let chartAlmacenInstance = null;

// ── CARGA DE DATOS ────────────────────────────────────────────────
async function cargarDatos(silencioso = false) {
  if (!silencioso) mostrarLoader();
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    allData = (json.datos || []).map(r => ({
      ...r,
      orden2_num: r.orden2 ? parseFloat(String(r.orden2).replace(",",".")) : 999999
    }));
    if (personalList.length === 0) {
      try {
        const pRes = await fetch(PERSONAL_URL + "?t=" + Date.now());
        if (pRes.ok) { const pJson = await pRes.json(); personalList = pJson.personal || []; }
      } catch(e) {}
    }
    await cargarAsignaciones();
    buildCtx(json);
    renderUI(json);
    renderRegistroVivo();
    document.getElementById("hStatus").className = "hstatus ok";
    document.getElementById("hStatus").textContent = "✓ Actualizado";
    document.getElementById("hTime").textContent = json.ultima_actualizacion || "";
  } catch(e) {
    if (!silencioso) mostrarError(e.message);
    else {
      document.getElementById("hStatus").className = "hstatus err";
      document.getElementById("hStatus").textContent = "Sin conexión";
    }
  }
  if (tabActual === "dashboard") renderDashboard();
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(() => cargarDatos(true), REFRESH_MS);
}

async function cargarAsignaciones() {
  try {
    const res = await fetch(WORKER_URL + "/asignaciones?t=" + Date.now());
    if (!res.ok) return;
    const json = await res.json();
    // FIX PRINCIPAL: normalizar picador — el Worker puede guardarlo como "nombre" o "picador"
    asignaciones = (json.asignaciones || []).map(a => ({
      ...a,
      picador: a.picador || a.nombre || "—",
      nombre: a.picador || a.nombre || "—",
    }));
  } catch(e) {}
}

function buscarAsignacion(placa, material) {
  const row = allData.find(r => r.placa === placa && String(r.material) === String(material));
  const familia = row ? row.familia : "";
  return asignaciones.find(a => a.placa === placa && (a.familia || "") === (familia || ""));
}

// ── ASIGNACIÓN ────────────────────────────────────────────────────
function actualizarPlacasAsig() {
  const familia = document.getElementById("selFamiliaAsig").value;
  const selPlaca = document.getElementById("selPlacaAsig");
  selPlaca.innerHTML = `<option value="">Placa...</option>`;
  if (familia) {
    const placas = [...new Set(allData.filter(r => r.familia === familia).map(r => r.placa).filter(Boolean))].sort();
    placas.forEach(p => {
      const yaAsig = asignaciones.find(a => a.placa === p && (a.familia || "") === familia);
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = yaAsig ? `${p} (✓ ${yaAsig.picador})` : p;
      selPlaca.appendChild(opt);
    });
  }
  actualizarNombreAsigState();
}

function actualizarNombreAsigState() {
  const familia = document.getElementById("selFamiliaAsig").value;
  const placa = document.getElementById("selPlacaAsig").value;
  const nombre = document.getElementById("selPicadorAsig").value;
  document.getElementById("btnAsigPanel").disabled = !(familia && placa && nombre);
}

async function confirmarAsignacionPanel() {
  const familia = document.getElementById("selFamiliaAsig").value;
  const placa = document.getElementById("selPlacaAsig").value;
  const nombre = document.getElementById("selPicadorAsig").value;
  const msgEl = document.getElementById("msgAsigPanel");
  const btn = document.getElementById("btnAsigPanel");
  if (!familia || !placa || !nombre) return;

  const filasCoincidentes = allData.filter(r => r.placa === placa && r.familia === familia);
  const totalKg = filasCoincidentes.reduce((s,r) => s+(r.peso_kg||0), 0);
  const totalCajas = filasCoincidentes.reduce((s,r) => s+(r.cajas||0), 0);
  const totalUnds = filasCoincidentes.reduce((s,r) => s+(r.unds||0), 0);
  const filasRegular = filasCoincidentes.filter(r => (r.estado||"").trim() === "Picking_Regular");
  const kgRegular = filasRegular.reduce((s,r) => s+(r.peso_kg||0), 0);
  const ref = filasCoincidentes[0];
  const zona = ref ? (ref.status || "") : "";

  btn.disabled = true;
  msgEl.textContent = "Guardando...";
  msgEl.className = "asig-msg";

  try {
    const res = await fetch(WORKER_URL + "/asignaciones", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        placa, familia, zona,
        material: ref ? String(ref.material) : "",
        denominacion: ref ? ref.denominacion : "",
        controlador: ref ? ref.controlador : "",
        picador: nombre,
        nombre: nombre,
        kg: Math.round(totalKg * 100) / 100,
        kg_regular: Math.round(kgRegular * 100) / 100,
        cajas: Math.round(totalCajas),
        unds: Math.round(totalUnds),
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error al guardar");
    msgEl.textContent = `✅ ${nombre} registrado en ${placa} (Familia ${familia}) — ${totalKg.toFixed(1)} kg`;
    msgEl.className = "asig-msg ok";
    await cargarAsignaciones();
    actualizarPlacasAsig();
    renderRegistroVivo();
    filtrar();
    if (tabActual === "dashboard") renderDashboard();
  } catch(e) {
    msgEl.textContent = "❌ " + e.message;
    msgEl.className = "asig-msg err";
  } finally {
    btn.disabled = false;
  }
}

function renderRegistroVivo() {
  const cont = document.getElementById("registroVivo");
  if (!cont) return;
  if (!asignaciones.length) { cont.innerHTML = ""; return; }

  const ordenadas = [...asignaciones].sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
  let html = `
    <div class="reg-vivo-title">📋 Registro en vivo del día</div>
    <div class="reg-vivo-table-wrap">
      <table class="reg-vivo-table">
        <tr><th>Picador</th><th>Familia</th><th>Placa</th><th style="text-align:center">Kg</th><th></th></tr>
        ${ordenadas.map(a => `
          <tr>
            <td>${a.picador || "—"}</td>
            <td><span class="zona-badge zona-${a.familia}">${a.familia || "—"}</span></td>
            <td><span class="pc-placa" style="font-size:11px">${a.placa || "—"}</span></td>
            <td style="text-align:center;font-weight:700;color:#0d3b61">${(a.kg||0).toFixed(1)}</td>
            <td style="text-align:center">
              <button class="reg-del-btn" onclick="solicitarBorradoRegistro('${a.placa}','${a.familia}')" title="Borrar">🗑️</button>
            </td>
          </tr>`).join("")}
      </table>
    </div>`;
  cont.innerHTML = html;
}

function solicitarBorradoRegistro(placa, familia) {
  const pin = prompt("Ingresa el PIN de supervisor para borrar este registro:");
  if (pin === null) return;
  if (pin !== PIN_SUPERVISOR) { alert("PIN incorrecto."); return; }
  if (!confirm(`¿Confirmas borrar el registro de la placa ${placa} (Familia ${familia})?`)) return;
  borrarRegistro(placa, familia);
}

async function borrarRegistro(placa, familia) {
  try {
    const res = await fetch(WORKER_URL + "/asignaciones?placa=" + encodeURIComponent(placa) + "&familia=" + encodeURIComponent(familia), {
      method: "DELETE", headers: {"Content-Type":"application/json"}
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error al borrar");
    await cargarAsignaciones();
    renderRegistroVivo();
    actualizarPlacasAsig();
    if (tabActual === "dashboard") renderDashboard();
  } catch(e) { alert("❌ Error al borrar: " + e.message); }
}

// ── CERRAR DÍA ────────────────────────────────────────────────────
async function cerrarDia() {
  const pin = prompt("Ingresa el PIN de supervisor para cerrar el día:");
  if (pin === null) return;
  if (pin !== PIN_SUPERVISOR) { alert("PIN incorrecto."); return; }

  const total = asignaciones.length;
  if (total === 0) { alert("No hay asignaciones registradas hoy para archivar."); return; }

  if (!confirm(`¿Confirmas cerrar el día?\n\nSe archivarán ${total} registro(s) en el histórico.\nLas asignaciones de hoy quedarán limpias para mañana.`)) return;

  const btn = document.getElementById("btnCerrarDia");
  const msgEl = document.getElementById("msgCerrarDia");
  if (btn) btn.disabled = true;
  if (msgEl) { msgEl.textContent = "Archivando..."; msgEl.className = "asig-msg"; }

  try {
    const res = await fetch(WORKER_URL + "/archivar", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error al archivar");

    if (msgEl) {
      msgEl.textContent = `✅ Día cerrado: ${data.archivados} registro(s) archivados en ${data.fecha}`;
      msgEl.className = "asig-msg ok";
    }

    // Recargar todo
    historicoPicadoresData = null;
    historicoData = null;
    await cargarAsignaciones();
    renderRegistroVivo();
    renderDashboard();
  } catch(e) {
    if (msgEl) { msgEl.textContent = "❌ Error: " + e.message; msgEl.className = "asig-msg err"; }
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── TABS ──────────────────────────────────────────────────────────
function switchTab(tab) {
  if (tab === "dashboard" && !productividadDesbloqueada) {
    const clave = prompt("Esta sección requiere clave de acceso:");
    if (clave === null) return;
    if (clave !== PASS_PRODUCTIVIDAD) { alert("Clave incorrecta."); return; }
    productividadDesbloqueada = true;
  }
  tabActual = tab;
  document.getElementById("tabConsulta").classList.toggle("on", tab === "consulta");
  document.getElementById("tabHistPick").classList.toggle("on", tab === "historico");
  document.getElementById("tabDash").classList.toggle("on", tab === "dashboard");
  document.getElementById("app").style.display = tab === "consulta" ? "block" : "none";
  document.getElementById("histPickApp").style.display = tab === "historico" ? "block" : "none";
  document.getElementById("dashApp").style.display = tab === "dashboard" ? "block" : "none";
  document.getElementById("dashHistorico").style.display = tab === "dashboard" ? "block" : "none";
  if (tab === "historico") cargarHistoricoPicadores();
  if (tab === "dashboard") { renderDashboard(); cargarHistorico(); cargarHistoricoPicadoresParaProductividad(); }
}

// ── HISTÓRICO DE PICADORES ────────────────────────────────────────
async function cargarHistoricoPicadores() {
  if (historicoPicadoresData) { renderHistoricoPicadores(); return; }
  document.getElementById("histPickApp").innerHTML = `<div class="hp-loading">Cargando histórico...</div>`;
  try {
    const res = await fetch(WORKER_URL + "/historico-picadores?t=" + Date.now());
    if (!res.ok) throw new Error("No se pudo cargar");
    historicoPicadoresData = await res.json();
    renderHistoricoPicadores();
  } catch(e) {
    document.getElementById("histPickApp").innerHTML = `<div class="hp-loading">No se pudo cargar el histórico.</div>`;
  }
}

async function cargarHistoricoPicadoresParaProductividad() {
  if (historicoPicadoresData) { renderDashboard(); return; }
  try {
    const res = await fetch(WORKER_URL + "/historico-picadores?t=" + Date.now());
    if (!res.ok) return;
    historicoPicadoresData = await res.json();
    if (tabActual === "dashboard") renderDashboard();
  } catch(e) {}
}

        </select>

        <div class="stat"><div class="stat-n">${(totalKg/1000).toFixed(1)}</div><div class="stat-l">Toneladas</div></div>
      </div>

function cambiarFechaHist(fecha) { fechaSeleccionadaHist = fecha; renderHistoricoPicadores(); }

function formatearFecha(fechaISO) {
  const [yyyy, mm, dd] = fechaISO.split("-");
  const meses = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${dd} ${meses[parseInt(mm)-1]} ${yyyy}`;
}

// ── HISTÓRICO DE TONELAJE ─────────────────────────────────────────
async function cargarHistorico() {
  if (historicoData) { renderGraficoHistorico(); return; }
  try {
    const res = await fetch(HISTORICO_URL + "?t=" + Date.now());
    if (!res.ok) return;
    historicoData = await res.json();
    renderGraficoHistorico();
  } catch(e) {}
}

function renderGraficoHistorico() {
  const cont = document.getElementById("dashHistorico");
  if (!cont) return;
  if (!historicoData || !historicoData.dias || Object.keys(historicoData.dias).length === 0) { cont.innerHTML = ""; return; }

  const fechas = Object.keys(historicoData.dias).sort();
  const labels = fechas.map(f => { const [,mm,dd] = f.split("-"); return `${dd}/${mm}`; });

  cont.innerHTML = `
    <div class="hist-title">📦 Tonelaje total por día</div>
    <div class="hist-chart-wrap"><canvas id="histChartTotal"></canvas></div>
    <div class="hist-title" style="margin-top:22px">🗂️ Por familia (toneladas)</div>
    <div class="hist-chart-wrap"><canvas id="histChartFamilia"></canvas></div>
    <div class="hist-legend" id="histLegendFamilia"></div>`;

  if (typeof Chart === "undefined") {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js";
    script.onload = () => dibujarGraficos(fechas, labels);
    document.head.appendChild(script);
  } else {
    dibujarGraficos(fechas, labels);
  }
}

function dibujarGraficos(fechas, labels) {
  const totales = fechas.map(f => Math.round(((historicoData.dias[f].total_kg||0)/1000)*100)/100);
  if (chartTotalInstance) chartTotalInstance.destroy();
  const ctxT = document.getElementById("histChartTotal");
  if (ctxT) chartTotalInstance = new Chart(ctxT, {
    type: "bar",
    data: { labels, datasets: [{ label:"Toneladas", data:totales, backgroundColor:"#0d3b61" }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ticks:{autoSkip:false,maxRotation:45}}, y:{title:{display:true,text:"Toneladas"}} } }
  });

  const famSet = new Set();
  fechas.forEach(f => Object.keys(historicoData.dias[f].por_familia||{}).forEach(c => famSet.add(c)));
  const fams = [...famSet].sort();
  const cols = ["#0d3b61","#1a73b8","#2e7d32","#bf360c","#7b1fa2","#bf6f00","#00838f","#ad1457"];
  const dsFamilia = fams.map((fam,i) => ({
    label: fam,
    data: fechas.map(f => Math.round((((historicoData.dias[f].por_familia||{})[fam]||0)/1000)*100)/100),
    borderColor: cols[i%cols.length], backgroundColor: cols[i%cols.length], fill:false, tension:0.25, pointRadius:3
  }));
  if (chartFamiliaInstance) chartFamiliaInstance.destroy();
  const ctxF = document.getElementById("histChartFamilia");
  if (ctxF) chartFamiliaInstance = new Chart(ctxF, {
    type: "line",
    data: { labels, datasets: dsFamilia },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} }, scales:{ x:{ticks:{autoSkip:false,maxRotation:45}}, y:{title:{display:true,text:"Toneladas"}} } }
  });
  const leg = document.getElementById("histLegendFamilia");
  if (leg) leg.innerHTML = dsFamilia.map(d => `<span class="hist-legend-item"><span class="hist-legend-dot" style="background:${d.borderColor}"></span>${d.label}</span>`).join("");
}

function renderDashboard() {

  // Botón cerrar día

  const htmlExport = `

      <button class="export-btn" onclick="exportarProductividadPDF()">📄 Exportar PDF</button>

  const htmlFiltro = renderFiltroHistoricoProductividad();

  if (!asignaciones.length) {
    cont.innerHTML = htmlCerrarDia + htmlExport + htmlFiltro + htmlRanking + `
      <div class="dash-section">
        <div class="dash-card"><div class="dash-empty">📊 Aún no hay asignaciones registradas hoy.<br>Cuando los pickers se registren en la pestaña Consulta, aparecerán aquí.</div></div>
      </div>`;
    return;
  }

  const porPlaca = {}, porControlador = {}, porFamilia = {};
  asignaciones.forEach(a => {
    const kg = a.kg||0, cajas = a.cajas||0, unds = a.unds||0;
    if (!porPlaca[a.placa]) porPlaca[a.placa] = {kg:0,cajas:0,unds:0};
    porPlaca[a.placa].kg+=kg; porPlaca[a.placa].cajas+=cajas; porPlaca[a.placa].unds+=unds;
    const ctrl = a.controlador||"—";
    if (!porControlador[ctrl]) porControlador[ctrl] = {kg:0,cajas:0,unds:0};
    porControlador[ctrl].kg+=kg; porControlador[ctrl].cajas+=cajas; porControlador[ctrl].unds+=unds;
    const fam = a.familia||"—";
    if (!porFamilia[fam]) porFamilia[fam] = {kg:0,cajas:0,unds:0};
    porFamilia[fam].kg+=kg; porFamilia[fam].cajas+=cajas; porFamilia[fam].unds+=unds;
  });

  const rankPlaca = Object.entries(porPlaca).sort((a,b) => b[1].kg-a[1].kg);
  const rankCtrl = Object.entries(porControlador).sort((a,b) => b[1].kg-a[1].kg);
  const rankFamilia = Object.entries(porFamilia).sort((a,b) => b[1].kg-a[1].kg);
  const maxP = Math.max(...rankPlaca.map(([,v])=>v.kg),1);
  const maxC = Math.max(...rankCtrl.map(([,v])=>v.kg),1);
  const maxF = Math.max(...rankFamilia.map(([,v])=>v.kg),1);
  const pickersHoy = new Set(asignaciones.map(a=>a.picador)).size;

  let html = `<div class="dash-section">

      <div class="stat"><div class="stat-n">${asignaciones.length}</div><div class="stat-l">Registros hoy</div></div>
      <div class="stat"><div class="stat-n">${pickersHoy}</div><div class="stat-l">Pickers activos</div></div>
      <div class="stat"><div class="stat-n">${asignaciones.reduce((s,a)=>s+(a.kg||0),0).toFixed(0)}</div><div class="stat-l">Kg totales</div></div>
    </div>
    <div class="dash-title">🚚 Por Placa (Kg)</div><div class="dash-card">`;
  rankPlaca.slice(0,15).forEach(([p,v],i) => {
    html += `<div class="dash-row"><div class="dash-name"><span class="dash-rank ${rankClass(i)}">${i+1}</span>${p}</div><div class="dash-bar-wrap"><div class="dash-bar" style="width:${Math.round(v.kg/maxP*100)}%"></div></div><div class="dash-val">${v.kg.toFixed(1)} kg</div></div>`;
  });
  html += `</div><div class="dash-title">👷 Por Controlador (Kg)</div><div class="dash-card">`;
  rankCtrl.forEach(([n,v],i) => {
    html += `<div class="dash-row"><div class="dash-name"><span class="dash-rank ${rankClass(i)}">${i+1}</span>${n}</div><div class="dash-bar-wrap"><div class="dash-bar" style="width:${Math.round(v.kg/maxC*100)}%"></div></div><div class="dash-val">${v.kg.toFixed(1)} kg</div></div>`;
  });
  html += `</div><div class="dash-title">🗂️ Por Familia (Kg)</div><div class="dash-card">`;
  rankFamilia.forEach(([n,v],i) => {
    html += `<div class="dash-row"><div class="dash-name"><span class="dash-rank ${rankClass(i)}">${i+1}</span>Familia ${n}</div><div class="dash-bar-wrap"><div class="dash-bar" style="width:${Math.round(v.kg/maxF*100)}%"></div></div><div class="dash-val">${v.kg.toFixed(1)} kg</div></div>`;
  });
  html += `</div></div>`;

  cont.innerHTML = htmlCerrarDia + htmlExport + htmlFiltro + htmlRanking + html;
}

function renderFiltroHistoricoProductividad() {
  const dias = (historicoPicadoresData && historicoPicadoresData.dias) || {};
  const fechas = Object.keys(dias).sort().reverse();
  const HOY_KEY = "__hoy__";
  if (!fechaProductividad) fechaProductividad = HOY_KEY;

  // Datos del día seleccionado
  let registrosBase = [];
  if (fechaProductividad === HOY_KEY || fechas.length === 0) {
    registrosBase = asignaciones;
  } else {
    registrosBase = dias[fechaProductividad] || [];
  }

  const familias = [...new Set(registrosBase.map(r => r.familia||"—"))].sort();
  const zonas = [...new Set(registrosBase.map(r => r.zona||"—").filter(z=>z&&z!=="—"))].sort();

  let filtrados = registrosBase;
  if (familiaProductividad !== "todas") filtrados = filtrados.filter(r => (r.familia||"—") === familiaProductividad);
  if (zonaProductividad !== "todas") filtrados = filtrados.filter(r => (r.zona||"—") === zonaProductividad);
  registrosFiltradosProductividad = filtrados;

  const placasPorFamilia = {};
  registrosBase.forEach(r => {
    const fam = r.familia||"—";
    if (!placasPorFamilia[fam]) placasPorFamilia[fam] = new Set();
    placasPorFamilia[fam].add(r.placa);
  });

  const totalPlacas = new Set(filtrados.map(r=>r.placa)).size;
  const totalKg = filtrados.reduce((s,r)=>s+(r.kg||0),0);
  const etiqueta = (fechaProductividad === HOY_KEY || fechas.length===0) ? "Hoy (en vivo)" : formatearFecha(fechaProductividad);

  const selectorFecha = fechas.length > 0 ? `
    <div class="hp-select-row" style="margin-bottom:8px">
      <label class="hp-label">📅 Día</label>
      <select onchange="cambiarFechaProductividad(this.value)">
        <option value="${HOY_KEY}" ${fechaProductividad===HOY_KEY?'selected':''}>📅 Hoy (en vivo)</option>
        ${fechas.map(f=>`<option value="${f}" ${f===fechaProductividad?'selected':''}>${formatearFecha(f)}</option>`).join("")}
      </select>
    </div>` : `<div style="padding:6px 0;font-size:12px;color:#90a4ae">📭 Sin días archivados aún — mostrando datos de hoy</div>`;

  return `
    <div class="hp-section">
      <div class="dash-title" style="margin-top:0">🔎 Filtro Ranking de Picadores</div>
      ${selectorFecha}
      <div class="hp-select-row" style="margin-bottom:8px">
        <label class="hp-label">🗂️ Familia</label>
        <select onchange="cambiarFamiliaProductividad(this.value)">
          <option value="todas" ${familiaProductividad==='todas'?'selected':''}>Todas las familias</option>
          ${familias.map(f=>`<option value="${f}" ${f===familiaProductividad?'selected':''}>Familia ${f}</option>`).join("")}
        </select>

function renderRankingPicadores() {
  const porPicador = {};
  registrosFiltradosProductividad.forEach(r => {
    const nombre = r.picador || r.nombre || "—";
    const kg = r.kg_regular || 0;
    if (!porPicador[nombre]) porPicador[nombre] = {kg:0, cajas:0, unds:0, placas:new Set()};
    porPicador[nombre].kg += kg;
    porPicador[nombre].cajas += (r.cajas||0);
    porPicador[nombre].unds += (r.unds||0);
    porPicador[nombre].placas.add(r.placa);
  });

  const rank = Object.entries(porPicador).sort((a,b) => b[1].kg-a[1].kg);
  const maxKg = Math.max(...rank.map(([,v])=>v.kg), 1);
  const HOY_KEY = "__hoy__";
  const fechaLabel = (!fechaProductividad || fechaProductividad === HOY_KEY) ? "Hoy (en vivo)" : formatearFecha(fechaProductividad);

  if (rank.length === 0) {
    return `<div class="dash-section">
      <div class="dash-title" style="margin-top:0">🏆 Ranking de Picadores — ${fechaLabel}</div>
      <div class="dash-card"><div class="dash-empty">No hay datos para este filtro.<br><small>Los pickers deben registrarse en la pestaña Consulta.</small></div></div>
    </div>`;
  }

  let html = `<div class="dash-section">
    <div class="dash-title" style="margin-top:0">🏆 Ranking de Picadores (Kg Regular) — ${fechaLabel}</div>
    <div class="dash-card">`;
  rank.forEach(([nombre,v],i) => {
    html += `<div class="dash-row">
      <div class="dash-name"><span class="dash-rank ${rankClass(i)}">${i+1}</span>${nombre}</div>
      <div class="dash-bar-wrap"><div class="dash-bar" style="width:${Math.round(v.kg/maxKg*100)}%"></div></div>
      <div class="dash-val">${v.kg.toFixed(1)} kg · ${v.placas.size} pl</div>
    </div>`;
  });
  html += `</div></div>`;
  return html;
}

function rankClass(i) { return i===0?"top1":i===1?"top2":i===2?"top3":""; }

function solicitarRecalculoKgRegular() {
  const pin = prompt("PIN de supervisor:");
  if (pin === null) return;
  if (pin !== PIN_SUPERVISOR) { alert("PIN incorrecto."); return; }
  if (!confirm(`¿Recalcular Kg de las ${asignaciones.length} asignaciones de hoy?`)) return;
  recalcularKgRegular();
}

async function recalcularKgRegular() {
  const msgEl = document.getElementById("msgRecalculo");
  if (msgEl) { msgEl.textContent = "Recalculando..."; msgEl.className = "asig-msg"; }

  const nuevas = asignaciones.map(a => {
    const filas = allData.filter(r => r.placa === a.placa && r.familia === a.familia);
    const filasReg = filas.filter(r => (r.estado||"").trim() === "Picking_Regular");
    const ref = filas[0];
    return {
      placa: a.placa, familia: a.familia,
      zona: a.zona || (ref ? ref.status||"" : ""),
      material: ref ? String(ref.material) : (a.material||""),
      denominacion: ref ? ref.denominacion : (a.denominacion||""),
      controlador: a.controlador,
      picador: a.picador, nombre: a.picador,
      kg: Math.round(filas.reduce((s,r)=>s+(r.peso_kg||0),0)*100)/100,
      kg_regular: Math.round(filasReg.reduce((s,r)=>s+(r.peso_kg||0),0)*100)/100,
      cajas: Math.round(filas.reduce((s,r)=>s+(r.cajas||0),0)),
      unds: Math.round(filas.reduce((s,r)=>s+(r.unds||0),0)),
      timestamp: a.timestamp || new Date().toISOString(),
    };
  });

  try {
    const res = await fetch(WORKER_URL + "/asignaciones", {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ asignaciones: nuevas })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error");
    if (msgEl) { msgEl.textContent = `✅ ${nuevas.length} asignaciones recalculadas.`; msgEl.className = "asig-msg ok"; }
  } catch(e) {
    if (msgEl) { msgEl.textContent = "❌ " + e.message; msgEl.className = "asig-msg err"; }
  }
  await cargarAsignaciones();
  renderRegistroVivo();
  if (tabActual === "dashboard") renderDashboard();
}

function cargarScriptExport(src) {
  return new Promise((resolve, reject) => {
    if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
    const s = document.createElement("script"); s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

function limpiar() { const b=document.getElementById("busq"); if(b){b.value="";filtrar();} }

function filtrar() {
  const q = (document.getElementById("busq")?.value||"").trim().toLowerCase();
  const fCtrl = document.getElementById("selFiltroControlador")?.value||"todos";
  const fZona = document.getElementById("selFiltroZona")?.value||"todas";
  const fFam = document.getElementById("selFiltroFamilia")?.value||"todas";
  let result = allData;
  if (fCtrl!=="todos") result = result.filter(r=>r.controlador===fCtrl);
  if (fZona!=="todas") result = result.filter(r=>r.status===fZona);
  if (fFam!=="todas") result = result.filter(r=>r.familia===fFam);
  if (q) result = result.filter(r=>(r.placa||"").toLowerCase().includes(q)||(r.controlador||"").toLowerCase().includes(q)||(r.denominacion||"").toLowerCase().includes(q)||String(r.material||"").toLowerCase().includes(q));
  renderCards(result);
}

function renderCards(data) {
  const container = document.getElementById("cards");
  if (!container) return;
  if (!data.length) { container.innerHTML=`<div class="no-results"><div class="ni">🔍</div><h3>Sin resultados</h3><p>Intenta con otra búsqueda</p></div>`; return; }

  const byMat = {};
  data.forEach(r => {
    const key=(r.material||"SIN COD")+"||"+(r.denominacion||"SIN DESC");
    if (!byMat[key]) byMat[key]={material:r.material,denominacion:r.denominacion,items:[],totalCj:0,totalUn:0};
    byMat[key].items.push(r); byMat[key].totalCj+=r.cajas; byMat[key].totalUn+=r.unds;
  });

  const placasU = [...new Set(data.map(r=>r.placa).filter(Boolean))].length;
  const entries = Object.values(byMat).sort((a,b)=>(a.material||"").localeCompare(b.material||""));

  entries.forEach((g,idx) => {
    const cj=Math.round(g.totalCj), un=Math.round(g.totalUn);
    const bodyId="body_"+idx, abierto=idx<3;
    const itemsOrdenados=[...g.items].sort((a,b)=>(a.orden2_num??999999)-(b.orden2_num??999999));

      <div class="pc-header" onclick="toggle('${bodyId}',this)">

          <div class="pc-toggle" id="tog_${bodyId}" style="margin-top:5px">${abierto?"▲ ocultar":"▼ ver detalle ("+g.items.length+" envíos)"}</div>
        </div>
        <div class="pc-right" style="flex-shrink:0;text-align:right;padding-left:8px">
          <div class="pc-totals" style="flex-direction:column;align-items:flex-end;gap:4px">
            <span class="pc-cj">📦 ${cj} cj</span>
            <span class="pc-un">📏 ${un} un</span>
          </div>
        </div>
      </div>
      <div class="pc-body" id="${bodyId}" style="display:${abierto?'block':'none'}">
        <div class="pc-table-wrap"><table class="pc-table">
          <tr><th style="text-align:center">N° Orden</th><th>Placa</th><th>Controlador</th><th>Picador</th><th style="text-align:center">Zona</th><th style="text-align:center">Cajas</th><th style="text-align:center">Unds</th></tr>`;
    itemsOrdenados.forEach(r => {
      const asig = buscarAsignacion(r.placa, r.material);
      html+=`<tr>
        <td style="text-align:center;font-weight:700;color:#546e7a">${r.orden2||"—"}</td>
        <td><span class="pc-placa" style="font-size:12px">${r.placa||"—"}</span></td>
        <td><div style="font-weight:600;font-size:13px;color:#1c2e3d">${r.controlador||"—"}</div></td>
        <td>${asig?`<span class="picador-tag">✓ ${asig.picador}</span>`:'<span style="color:#cfd8dc">—</span>'}</td>
        <td style="text-align:center">${r.status?`<span class="zona-badge zona-${r.status}">${r.status}</span>`:"—"}</td>
        <td style="text-align:center"><span class="n-cj">${Math.round(r.cajas)}</span></td>
        <td style="text-align:center"><span class="n-un">${Math.round(r.unds)}</span></td>
      </tr>`;
    });
    html+=`<tr class="pc-total-row"><td colspan="5" style="font-size:11px">TOTAL MATERIAL</td><td style="text-align:center" class="n-cj">${cj}</td><td style="text-align:center" class="n-un">${un}</td></tr>
        </table></div></div></div>`;
  });
  container.innerHTML = html;
}

async function sendAI(){
  const inp=document.getElementById("mInput");const q=inp.value.trim();
  if(!q)return;
  if(!ctx){addMsg("⚠️ Los datos aún no han sido cargados.","ai");return;}
  inp.value="";document.getElementById("mSend").disabled=true;
  addMsg(q,"user");addTyping();
  try{

    const d=await r.json();
    document.getElementById("typing")?.remove();
    addMsg(d.content?.[0]?.text||"No pude procesar la consulta.","ai");
  }catch(e){document.getElementById("typing")?.remove();addMsg("❌ Error de conexión.","ai");}
  document.getElementById("mSend").disabled=false;
  document.getElementById("msgs").scrollTop=99999;
}

// ── INICIO ────────────────────────────────────────────────────────
cargarDatos();
</script>
